# Build Release Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pyinstaller

      - name: Build macOS app
        run: pyinstaller xinyi.spec --clean

      - name: Package as ZIP
        run: cd dist && zip -r ../xinyi-macos.zip xinyi.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xinyi-macos
          path: xinyi-macos.zip
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pyinstaller

      - name: Build Windows exe
        run: pyinstaller xinyi-windows.spec --clean

      - name: Package as ZIP
        shell: powershell
        run: Compress-Archive -Path dist/xinyi -DestinationPath xinyi-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xinyi-windows
          path: xinyi-windows.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Determine release mode
        id: release_mode
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "mode=tag" >> $GITHUB_OUTPUT
            echo "tag_name=${{ github.ref }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            echo "mode=main" >> $GITHUB_OUTPUT
            echo "tag_name=v1.0.1" >> $GITHUB_OUTPUT
          else
            echo "mode=dispatch" >> $GITHUB_OUTPUT
            echo "tag_name=v1.0.1" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release (dispatch mode - overwrite v1.0.1)
        if: steps.release_mode.outputs.mode == 'dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1
          name: xinyi v1.0.1
          draft: false
          prerelease: false
          overwrite_files: true
          body: |
            xinyi v1.0.1 正式发布

            支持 macOS / Windows，下载对应安装包，双击即可运行，输入 API Key 即可使用。

            ## 下载地址
            - macOS: xinyi-macos.zip（Apple 芯片 / Intel）
            - Windows: xinyi-windows.zip

            ## 使用方法
            1. 下载并解压对应平台的安装包
            2. 双击 xinyi.app（macOS）或运行 xinyi.exe（Windows）
            3. 打开浏览器访问 http://localhost:7872
            4. 在设置页面填入你的 API Key

            ## 更新内容
            - 修复旧版本 32.7 闪退问题
            - 修复 API key 配置问题
            - 改进数据隐私说明
            - 优化 UI 体验
          files: |
            artifacts/xinyi-macos/xinyi-macos.zip
            artifacts/xinyi-windows/xinyi-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload to Release (main branch - overwrite v1.0.1)
        if: steps.release_mode.outputs.mode == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1
          name: xinyi v1.0.1
          draft: false
          prerelease: false
          overwrite_files: true
          body: |
            xinyi v1.0.1 正式发布

            支持 macOS / Windows，下载对应安装包，双击即可运行，输入 API Key 即可使用。

            ## 下载地址
            - macOS: xinyi-macos.zip（Apple 芯片 / Intel）
            - Windows: xinyi-windows.zip

            ## 使用方法
            1. 下载并解压对应平台的安装包
            2. 双击 xinyi.app（macOS）或运行 xinyi.exe（Windows）
            3. 打开浏览器访问 http://localhost:7872
            4. 在设置页面填入你的 API Key

            ## 更新内容
            - 修复旧版本 32.7 闪退问题
            - 修复 API key 配置问题
            - 改进数据隐私说明
            - 优化 UI 体验
          files: |
            artifacts/xinyi-macos/xinyi-macos.zip
            artifacts/xinyi-windows/xinyi-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Create Release (tag mode - new release)
        if: steps.release_mode.outputs.mode == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: xinyi ${{ github.ref }}
          generate_release_notes: true
          draft: false
          files: |
            artifacts/xinyi-macos/xinyi-macos.zip
            artifacts/xinyi-windows/xinyi-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
