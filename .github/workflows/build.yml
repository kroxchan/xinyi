# Build Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pyinstaller

      - name: Build macOS app
        run: pyinstaller xinyi.spec --clean

      - name: Package as ZIP
        run: cd dist && zip -r ../xinyi-macos.zip xinyi.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xinyi-macos
          path: xinyi-macos.zip
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pyinstaller

      - name: Build Windows exe
        run: pyinstaller xinyi-windows.spec --clean

      - name: Package as ZIP
        shell: powershell
        run: Compress-Archive -Path dist/xinyi -DestinationPath xinyi-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xinyi-windows
          path: xinyi-windows.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Determine release mode
        id: release_mode
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "mode=tag" >> $GITHUB_OUTPUT
            echo "tag_name=${{ github.ref }}" >> $GITHUB_OUTPUT
          else
            echo "mode=dispatch" >> $GITHUB_OUTPUT
            echo "tag_name=v1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release (dispatch mode - overwrite v1.0.0)
        if: steps.release_mode.outputs.mode == 'dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: xinyi v1.0.0
          draft: false
          prerelease: false
          overwrite: true
          files: |
            artifacts/xinyi-macos/xinyi-macos.zip
            artifacts/xinyi-windows/xinyi-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (tag mode - new release)
        if: steps.release_mode.outputs.mode == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: xinyi ${{ github.ref }}
          generate_release_notes: true
          draft: false
          files: |
            artifacts/xinyi-macos/xinyi-macos.zip
            artifacts/xinyi-windows/xinyi-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
