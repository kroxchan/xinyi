# Build Release Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pyinstaller

      - name: Build macOS app
        run: pyinstaller xinyi.spec --clean

      - name: Package as ZIP
        run: cd dist && zip -r ../xinyi-macos.zip xinyi.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xinyi-macos
          path: xinyi-macos.zip
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pyinstaller

      - name: Build Windows exe
        run: pyinstaller xinyi-windows.spec --clean

      - name: Smoke test Windows package
        shell: powershell
        run: |
          $env:XINYI_INBROWSER = "0"
          $proc = Start-Process -FilePath "$PWD\dist\xinyi\xinyi.exe" -PassThru
          try {
            $ok = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:7872/" -UseBasicParsing -TimeoutSec 5
                if ($resp.StatusCode -eq 200) {
                  $ok = $true
                  break
                }
              } catch {
              }
            }
            if (-not $ok) {
              throw "Smoke test failed: http://127.0.0.1:7872/ did not return HTTP 200"
            }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Package as ZIP
        shell: powershell
        run: Compress-Archive -Path dist\xinyi -DestinationPath xinyi-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xinyi-windows
          path: xinyi-windows.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Determine release mode
        id: release_mode
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "mode=tag" >> $GITHUB_OUTPUT
            echo "tag_name=${{ github.ref }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            echo "mode=main" >> $GITHUB_OUTPUT
            echo "tag_name=v1.0.4" >> $GITHUB_OUTPUT
          else
            echo "mode=dispatch" >> $GITHUB_OUTPUT
            echo "tag_name=v1.0.4" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release (dispatch mode - overwrite v1.0.4)
        if: steps.release_mode.outputs.mode == 'dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4
          name: xinyi v1.0.4
          draft: false
          prerelease: false
          overwrite_files: true
          body: |
            xinyi v1.0.4

            支持 macOS / Windows，下载对应安装包，解压后运行；启动后会尝试打开浏览器访问控制台。

            ## 下载
            - macOS: xinyi-macos.zip
            - Windows: xinyi-windows.zip

            ## 使用
            1. 解压后运行 xinyi.app（macOS）或 xinyi.exe（Windows）
            2. 浏览器访问 http://localhost:7872（若未自动打开请手动打开）
            3. 在「连接 / 设置」中填写 API Key 并保存

            ## 本版更新
            - 准备步骤预检优化：已编译则跳过，无关键依赖则友好提示
            - 重构 decrypt 模块清理逻辑与错误处理
            - 更新 thinking_profiler 推理链稳定性
          files: |
            artifacts/xinyi-macos/xinyi-macos.zip
            artifacts/xinyi-windows/xinyi-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release (main branch - overwrite v1.0.4)
        if: steps.release_mode.outputs.mode == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4
          name: xinyi v1.0.4
          draft: false
          prerelease: false
          overwrite_files: true
          body: |
            xinyi v1.0.4

            支持 macOS / Windows，下载对应安装包，解压后运行；启动后会尝试打开浏览器访问控制台。

            ## 下载
            - macOS: xinyi-macos.zip
            - Windows: xinyi-windows.zip

            ## 使用
            1. 解压后运行 xinyi.app（macOS）或 xinyi.exe（Windows）
            2. 浏览器访问 http://localhost:7872（若未自动打开请手动打开）
            3. 在「连接 / 设置」中填写 API Key 并保存

            ## 本版更新
            - 准备步骤预检优化：已编译则跳过，无关键依赖则友好提示
            - 重构 decrypt 模块清理逻辑与错误处理
            - 更新 thinking_profiler 推理链稳定性
          files: |
            artifacts/xinyi-macos/xinyi-macos.zip
            artifacts/xinyi-windows/xinyi-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (tag mode - new release)
        if: steps.release_mode.outputs.mode == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: xinyi ${{ github.ref }}
          generate_release_notes: true
          draft: false
          files: |
            artifacts/xinyi-macos/xinyi-macos.zip
            artifacts/xinyi-windows/xinyi-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
