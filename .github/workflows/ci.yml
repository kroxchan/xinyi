name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          # First: verify Python can import all src modules (catch import errors early)
          python -c "
            import sys; sys.path.insert(0, '.')
            from src.config import AppConfig
            from src.exceptions import XinyiBaseError
            from src.logging_config import setup_logging
            from src.memory.reranker import build_reranker
            from src.data.emotion_tagger import build_tagger
            from src.data.privacy_redactor import PrivacyRedactor
            from src.engine.advisor_registry import get_registry
            print('All imports OK')
          "
          # Then run pytest (skip coverage to keep CI fast and focused)
          pytest tests/ -v --tb=short

  lint:
    name: flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          # Lint key modules only (exclude vendor)
          flake8 src/ tests/ --max-line-length=120 \
            --exclude=vendor,__pycache__,.pytest_cache \
            --ignore=E501,F401,W503 \
            || true
