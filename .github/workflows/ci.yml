name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-cov

      - name: Run tests
        run: |
          echo "Python version: $(python --version)"
          echo "pytest version: $(pip show pytest | grep Version)"
          echo "---"
          echo "Running import check..."
          python -c "import sys; sys.path.insert(0, '.'); exec(open('tests/check_imports.py').read())" || exit 1
          echo "---"
          echo "Running pytest..."
          pytest tests/ -v --tb=short

  lint:
    name: flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ tests/ --max-line-length=120 \
            --exclude=vendor,__pycache__,.pytest_cache \
            --ignore=E501,F401,W503 \
            || true
